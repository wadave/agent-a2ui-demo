steps:
  # Install uv and sync dependencies into /workspace/.venv (shared across steps)
  - name: "python:3.12-slim"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv==0.8.13 --quiet --user
        ~/.local/bin/uv sync --locked

  # Run unit tests (fast, no external API calls)
  - name: "python:3.12-slim"
    id: unit-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        /workspace/.venv/bin/pytest tests/unit -v

  # Run local server integration tests (starts app.main:app locally, no Vertex AI)
  - name: "python:3.12-slim"
    id: integration-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        /workspace/.venv/bin/pytest tests/integration -v --ignore=tests/integration/remote_e2e_test.py
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=us-central1"
      - "GOOGLE_GENAI_USE_VERTEXAI=TRUE"

logsBucket: gs://${PROJECT_ID}-agent-a2ui-skill-demo-logs/build-logs
options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
